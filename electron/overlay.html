<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- CSP: connect-src 'self' → mirrored HTML (LLM/transcript) ที่ inject แล้วยิงเน็ตออกไม่ได้ -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" />
  <title>Meeting Overlay</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* overlay-specific: หน้าต่าง transparent — พื้นขาว-ม่วงโปร่ง (--ov-a) + ตัวอักษรสีขาว
       ความโปร่งคุมเฉพาะพื้นหลัง; ตัวอักษรขาวคมด้วย text-shadow เข้ม (อ่านได้ทั้งบนพื้น+desktop ทะลุ) */
    html, body { margin:0; height:100vh; background:transparent; }
    body { display:flex; flex-direction:column; color:#fff;
      background:rgba(38,26,58,var(--ov-a,.7));
      font-family:Inter,system-ui,-apple-system,sans-serif; overflow:hidden; }
    .ov-head { -webkit-app-region: drag; display:flex; align-items:center; gap:8px; flex:none;
      padding:7px 10px; background:rgba(52,36,80,var(--ov-a,.72)); border-bottom:1px solid rgba(255,255,255,.16); user-select:none; }
    .ov-title { font-size:12px; font-weight:700; color:#fff; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 3px rgba(0,0,0,.6); }
    .ov-head .fc-stat { flex:none; font-size:11px; color:#fff; opacity:.75; white-space:nowrap; text-shadow:0 1px 3px rgba(0,0,0,.6); }
    .ov-head .no-drag, .ov-head input { -webkit-app-region: no-drag; }
    .ov-op { width:70px; accent-color:#fff; }
    .ov-btn { width:26px; height:26px; padding:0; border:none; border-radius:6px; font-size:13px; cursor:pointer;
      background:rgba(255,255,255,.18); color:#fff; }
    .ov-btn:hover { background:rgba(255,255,255,.32); }
    .ov-btn.on { background:#fff; color:#3a2a5e; }
    #overlayResults { flex:1; overflow-y:auto; padding:10px; background:transparent; }
    /* message ไม่มีกล่องพื้น — ตัวอักษรลอยบนพื้นม่วงดำโปร่ง; text-shadow เข้มให้อ่านชัด */
    #overlayResults .msg { margin-bottom:14px; max-width:100%; }
    #overlayResults .bubble { background:transparent !important; border:none !important; padding:2px 0; }
    #overlayResults .msg.ai .bubble, #overlayResults .ans { color:#fff; }
    #overlayResults .role, #overlayResults .ans, #overlayResults .bubble {
      text-shadow:0 1px 3px rgba(0,0,0,.9), 0 0 2px rgba(0,0,0,.7); }
    /* role label เด่น: ใหญ่+หนา, AI=teal / ผู้ถาม=ขาว */
    #overlayResults .role { font-size:12px; font-weight:800; letter-spacing:.3px; margin:0 0 5px; }
    #overlayResults .msg.ai .role { color:var(--teal); }
    #overlayResults .msg.user .role { color:#fff; }
    /* แยก turn: เส้นคั่นบางๆ เหนือคำถามใหม่ (ยกเว้นอันแรก) */
    #overlayResults .msg.user { border-top:1px solid rgba(255,255,255,.16); padding-top:12px; margin-top:8px; }
    #overlayResults .msg.user:first-child { border-top:none; padding-top:0; margin-top:0; }
    /* คำถาม (user): accent เส้น teal ซ้าย + ตัวอักษร teal อ่อน → เด่นจากคำตอบ */
    #overlayResults .msg.user .bubble { border-left:3px solid var(--teal) !important; padding-left:10px; color:#86f1e2; font-weight:600; }
    /* คง bg ของ code block (อ่านโค้ดชัด) */
    #overlayResults pre, #overlayResults code, #overlayResults .codewrap { text-shadow:none; }
    /* control bar: พื้นม่วงดำโปร่งตาม --ov-a */
    .float-composer { background:rgba(52,36,80,var(--ov-a,.72)); }
    /* readonly (ดู session เก่า): ซ่อน composer + โชว์ note */
    #ovRoNote { display:none; flex:none; text-align:center; padding:9px 10px; font-size:12px; font-weight:600;
      color:#fff; background:rgba(52,36,80,var(--ov-a,.72)); border-top:1px solid rgba(255,255,255,.16);
      text-shadow:0 1px 3px rgba(0,0,0,.6); }
    body.readonly .float-composer { display:none; }
    body.readonly #ovRoNote { display:block; }
    /* cold-control toolbar (ย้ายมาจาก chat header) */
    .fc-toolbar { flex:none; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
      padding:6px 10px; background:rgba(52,36,80,var(--ov-a,.72)); border-bottom:1px solid rgba(255,255,255,.16); }
    .fc-toolbar .seg { background:rgba(255,255,255,.12); border:none; }
    .fc-toolbar .seg button { color:#fff; }
    .fc-toolbar .seg button.on { background:#fff; color:#3a2a5e; }
    .fc-toolbar .pill { background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.18); color:#fff; padding:5px 9px; }
    .fc-toolbar .pill.on { background:#fff; color:#3a2a5e; }
    .fc-toolbar .iconbtn { background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.18); color:#fff; width:30px; height:30px; }
    .fc-toolbar .fc-stat { margin-left:auto; font-size:11px; color:#fff; opacity:.8; text-shadow:0 1px 3px rgba(0,0,0,.6); }
    body.readonly .fc-toolbar { display:none; }
    /* status (กำลังฟัง/เห็นจอ) + error mirror + empty hint */
    #ovStatus { flex:none; display:none; padding:5px 12px; font-size:11px; color:#86f1e2;
      text-shadow:0 1px 3px rgba(0,0,0,.7); }
    #ovErr { flex:none; display:none; padding:7px 12px; font-size:12px; color:#fff;
      background:rgba(201,58,52,.85); text-shadow:0 1px 2px rgba(0,0,0,.5); }
    .float-empty { padding:24px 12px; text-align:center; font-size:13px; color:#fff; opacity:.75;
      text-shadow:0 1px 3px rgba(0,0,0,.7); }
    /* quick-ask + follow-up chips */
    .fc-quick { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
    .followups { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .chip-ask { background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22); color:#fff;
      border-radius:999px; padding:5px 11px; font-size:12px; cursor:pointer; text-shadow:0 1px 2px rgba(0,0,0,.5); }
    .chip-ask:hover { background:#fff; color:#3a2a5e; }
  </style>
</head>
<body>
  <div class="ov-head">
    <span class="ov-title" id="ovTitle">🎤 Meeting</span>
    <span class="fc-stat mono"></span>
    <input type="range" id="ovOpacity" class="ov-op no-drag" min="0" max="100" value="85" title="ความโปร่งของพื้นหลัง (font/bubble ชัดเสมอ)" />
    <button id="ovTop" class="ov-btn no-drag on" title="ลอยเหนือเสมอ (always-on-top)">📌</button>
    <button id="ovShield" class="ov-btn no-drag" title="ซ่อนจากการแชร์จอ/บันทึกหน้าจอ">🛡</button>
    <button id="ovClose" class="ov-btn no-drag" title="ปิด">✕</button>
  </div>
  <div class="fc-toolbar">
    <button class="fc-screen pill">🖥 แชร์จอ</button>
    <button class="fc-auto pill on" title="ส่งอัตโนมัติหลังเงียบ">⚡</button>
    <div class="seg fc-lang"><button class="fc-th on">ไทย</button><button class="fc-en">Eng</button></div>
  </div>
  <div id="overlayResults" class="chat-msgs pip-msgs"></div>
  <div id="ovRoNote">🔒 ดูอย่างเดียว</div>
  <div id="ovStatus"></div>
  <div id="ovErr"></div>
  <div class="float-composer">
    <div class="fc-quick"></div>
    <div class="fc-inputrow">
      <button class="fc-mic mic">🎤 เริ่มฟัง</button>
      <button class="fc-stop pill stopbtn" style="display:none">✂️ ส่งเลย</button>
      <input class="fc-input" placeholder="พิมพ์คำถาม…" />
      <button class="fc-send send">➤</button>
    </div>
  </div>

  <script>
    const api = window.electronAPI;
    const $ = (id) => document.getElementById(id);
    const lsGet = (k, d) => { try { const v = localStorage.getItem(k); return v == null ? d : v; } catch { return d; } };
    const lsSet = (k, v) => { try { localStorage.setItem(k, v); } catch {} };

    // ── mirror คำตอบจาก main ──
    const results = $("overlayResults");
    const EMPTY_HINT = '<div class="float-empty">พิมพ์หรือพูดคำถามด้านล่างเพื่อเริ่ม</div>';
    api.onOverlayHTML((html) => { results.innerHTML = html || EMPTY_HINT; results.scrollTop = results.scrollHeight; });

    // ── sync ปุ่ม control (label/display/on) จาก main ──
    api.onOverlayControls((s) => {
      [["fc-mic", s.mic], ["fc-stop", s.stop], ["fc-screen", s.screen]].forEach(([cls, st]) => {
        if (!st) return;
        const el = document.querySelector("." + cls); if (!el) return;
        if (st.label != null) el.textContent = st.label;
        if (st.display != null) el.style.display = st.display;
        el.classList.toggle("on", !!st.on);
      });
      if (s.fs) document.documentElement.style.setProperty("--fs", s.fs);   // ขนาดฟอนต์ตาม slider หน้าหลัก
      document.body.classList.toggle("readonly", !!s.readonly);             // ดู session เก่า → ซ่อน composer/toolbar
      if (s.title != null) $("ovTitle").textContent = (s.mode ? s.mode + " · " : "") + s.title;
      // error + status mirror (เดิมอยู่ใน #viewCurrent ที่ซ่อน → เงียบ)
      const errEl = $("ovErr"); errEl.textContent = s.error || ""; errEl.style.display = s.error ? "block" : "none";
      const stEl = $("ovStatus"); stEl.textContent = s.status || ""; stEl.style.display = s.status ? "block" : "none";
      // quick-ask chips (จาก main, single source QUICKASKS)
      if (s.quick && !document.querySelector(".fc-quick").dataset.filled) {
        document.querySelector(".fc-quick").innerHTML = s.quick.map(a =>
          `<button type="button" class="chip-ask" data-ask="${a.replace(/"/g,"&quot;")}">${a.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}</button>`).join("");
        document.querySelector(".fc-quick").dataset.filled = "1";
      }
      // cold controls: lang / auto / clear / stat
      const q = (c) => document.querySelector("." + c);
      if (s.langShow != null) q("fc-lang").style.display = s.langShow ? "" : "none";   // ไทย/Eng เฉพาะ web STT
      if (s.th != null) q("fc-th").classList.toggle("on", !!s.th);
      if (s.en != null) q("fc-en").classList.toggle("on", !!s.en);
      if (s.auto != null) q("fc-auto").classList.toggle("on", !!s.auto);
      if (s.stat != null) q("fc-stat").textContent = s.stat;
    });

    // ── control bar → ส่ง action กลับ main ──
    document.querySelector(".fc-mic").onclick = () => api.sendAction("mic");
    document.querySelector(".fc-stop").onclick = () => api.sendAction("stop");
    document.querySelector(".fc-screen").onclick = () => api.sendAction("screen");
    const input = document.querySelector(".fc-input");
    const doSend = () => { const v = (input.value || "").trim(); if (!v) return; input.value = ""; api.sendAction("send", v); };
    document.querySelector(".fc-send").onclick = doSend;
    input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); } });

    // ── cold-control toolbar → action กลับ main ──
    document.querySelector(".fc-th").onclick = () => api.sendAction("th");
    document.querySelector(".fc-en").onclick = () => api.sendAction("en");
    document.querySelector(".fc-auto").onclick = () => api.sendAction("auto");

    // quick + follow-up chips (delegation) → ถามต่อ
    document.body.addEventListener("click", (e) => {
      const c = e.target.closest(".chip-ask"); if (!c) return;
      const t = c.getAttribute("data-ask"); if (t) api.sendAction("ask", t);
    });

    // ── ความโปร่งของพื้นหลัง (CSS rgba alpha เท่านั้น — font/bubble ชัด 100%, ไม่หรี่ทั้งบาน) ──
    const setBgA = (v) => document.documentElement.style.setProperty("--ov-a", (v / 100).toFixed(2));
    const op0 = +lsGet("ov_op", "85");
    $("ovOpacity").value = op0; setBgA(op0);
    $("ovOpacity").oninput = () => { const v = +$("ovOpacity").value; setBgA(v); lsSet("ov_op", v); };

    // ── always-on-top toggle (default on) ──
    let aot = lsGet("ov_top", "1") === "1";
    $("ovTop").classList.toggle("on", aot); api.setAlwaysOnTop(aot);
    $("ovTop").onclick = () => { aot = !aot; $("ovTop").classList.toggle("on", aot); api.setAlwaysOnTop(aot); lsSet("ov_top", aot ? "1" : "0"); };

    // ── content protection (ซ่อนจากแชร์จอ) toggle (default ON — overlay มีคำตอบ AI ส่วนตัว ไม่ควรติดไปในจอที่แชร์) ──
    let cp = lsGet("ov_cp", "1") === "1";
    $("ovShield").classList.toggle("on", cp); api.setContentProtection(cp);
    $("ovShield").onclick = () => { cp = !cp; $("ovShield").classList.toggle("on", cp); api.setContentProtection(cp); lsSet("ov_cp", cp ? "1" : "0"); };

    // ── close ──
    $("ovClose").onclick = () => api.close();

    // ── แจ้ง main ว่า overlay พร้อมแล้ว → main จะ push html + control state เริ่มต้นกลับมา ──
    api.sendAction("ready");
  </script>
</body>
</html>
