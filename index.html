<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meeting Assistant</title>
<style>
  :root {
    --bg:#0F1419; --panel:#161B22; --panel2:#1A222C; --border:#26313D;
    --text:#E6EDF3; --muted:#8B98A5; --teal:#2DD4BF; --amber:#F0A93B; --red:#F0726B;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:Inter,system-ui,-apple-system,sans-serif; }
  .wrap { max-width:820px; margin:0 auto; padding:24px 16px 120px; }
  h1 { font-size:18px; font-weight:700; letter-spacing:-0.2px; margin:0; }
  .row { display:flex; align-items:center; gap:10px; }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .dot { width:8px; height:8px; border-radius:99px; background:var(--teal);
    box-shadow:0 0 12px var(--teal); }
  .dot.live { background:var(--red); box-shadow:0 0 12px var(--red); animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes spin { to { transform:rotate(360deg) } }
  .spin { animation:spin .8s linear infinite; }
  button { font-family:inherit; cursor:pointer; }
  button:focus-visible { outline:2px solid var(--teal); outline-offset:2px; }
  .iconbtn { display:flex; align-items:center; justify-content:center; width:30px; height:30px;
    background:var(--panel2); border:1px solid var(--border); border-radius:7px; color:var(--muted); }
  .tab { display:flex; align-items:center; gap:7px; padding:8px 14px; border-radius:9px;
    border:1px solid var(--border); background:var(--panel); color:var(--muted);
    font-size:13px; font-weight:600; }
  .tab.on { border-color:var(--teal); background:rgba(45,212,191,.1); color:var(--teal); }
  .bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--panel);
    border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:12px; }
  .bar.active { border-color:var(--teal); }
  .pill { display:flex; align-items:center; gap:6px; padding:9px 11px; border-radius:9px;
    border:1px solid var(--border); background:var(--panel2); color:var(--muted);
    font-size:12px; font-weight:600; }
  .pill.on { border-color:var(--teal); background:rgba(45,212,191,.08); color:var(--teal); }
  .mic { display:flex; align-items:center; gap:8px; padding:10px 16px; border-radius:10px;
    border:none; background:var(--teal); color:#06231F; font-weight:700; font-size:14px; }
  .mic.on { background:var(--red); color:#fff; }
  .send { margin-left:auto; display:flex; align-items:center; gap:6px; background:var(--panel2);
    color:var(--muted); border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; }
  .send.ready { background:var(--teal); color:#06231F; }
  textarea { width:100%; background:transparent; border:none; outline:none; color:var(--text);
    resize:vertical; font-size:14px; line-height:1.6; font-family:inherit; }
  textarea::placeholder { color:var(--muted); }
  input, select { background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:8px 10px; font-size:13px; font-family:inherit; outline:none; }
  input:focus, select:focus { border-color:var(--teal); }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; margin-top:14px; }
  .q { font-size:13px; color:var(--muted); margin-bottom:12px; padding-bottom:12px;
    border-bottom:1px solid var(--border); font-weight:500; display:flex; align-items:center; gap:8px; }
  .ans { font-size:14px; line-height:1.65; color:var(--text); white-space:pre-wrap; }
  .tag { display:inline-flex; align-items:center; gap:4px; font-size:10.5px; color:var(--teal);
    background:rgba(45,212,191,.08); border:1px solid var(--border); border-radius:5px; padding:2px 6px; }
  .stack { font-size:12px; color:var(--teal); background:rgba(45,212,191,.08);
    border:1px solid var(--border); border-radius:6px; padding:3px 8px; }
  .lbl { display:flex; align-items:center; gap:5px; color:var(--muted); font-size:10.5px;
    font-weight:700; letter-spacing:1px; }
  .seg { display:flex; gap:4px; background:var(--panel2); border-radius:8px; padding:3px; }
  .seg button { padding:5px 10px; border-radius:6px; border:none; font-size:12px; font-weight:600;
    background:transparent; color:var(--muted); }
  .seg button.on { background:var(--teal); color:#06231F; }
  .warn { color:var(--amber); font-size:12px; display:flex; gap:8px; align-items:center; margin-bottom:12px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:560px){ .grid{ grid-template-columns:1fr; } }
  a { color:var(--teal); }
</style>
</head>
<body>
<video id="screenVideo" muted playsinline style="display:none"></video>
<div class="wrap">
  <div class="row" style="margin-bottom:18px">
    <div id="dot" class="dot"></div>
    <h1>Meeting Assistant</h1>
    <span id="count" class="mono" style="font-size:11px;color:var(--muted);margin-left:auto">0 รายการ</span>
    <button id="gear" class="iconbtn" title="ตั้งค่า">⚙</button>
    <button id="clear" class="iconbtn" title="ล้างทั้งหมด" style="display:none">🗑</button>
  </div>

  <!-- Settings -->
  <div id="settings" class="bar" style="flex-direction:column;align-items:stretch;gap:10px">
    <div class="grid">
      <div>
        <div class="lbl" style="margin-bottom:6px">PROVIDER</div>
        <select id="provider" style="width:100%">
          <option value="openrouter">OpenRouter</option>
          <option value="gemini">Google Gemini</option>
          <option value="openai">OpenAI (GPT)</option>
          <option value="claude">Anthropic (Claude)</option>
        </select>
      </div>
      <div>
        <div class="lbl" style="margin-bottom:6px">MODEL</div>
        <input id="model" style="width:100%" placeholder="model id" />
      </div>
    </div>
    <div>
      <div class="lbl" style="margin-bottom:6px">API KEY <span id="keyHint" style="font-weight:500;letter-spacing:0;text-transform:none;color:var(--muted)"></span></div>
      <input id="apikey" type="password" style="width:100%" placeholder="วาง API key ที่นี่" autocomplete="off" />
    </div>
    <div class="mono" style="font-size:11px;color:var(--muted)">
      key เก็บไว้ใน browser ของเครื่องนี้เท่านั้น (localStorage) ไม่ส่งไปไหนนอกจาก provider ที่เลือก
    </div>
  </div>

  <!-- Tabs -->
  <div class="row" style="gap:8px;margin-bottom:14px">
    <button id="tabQa" class="tab on">🧠 ถาม AI</button>
    <button id="tabEst" class="tab">📊 ประเมินงาน</button>
  </div>

  <!-- Control bar -->
  <div id="ctrl" class="bar">
    <button id="micBtn" class="mic">🎤 เริ่มฟัง</button>
    <button id="screenBtn" class="pill">🖥 แชร์จอ</button>
    <button id="autoBtn" class="pill on">⚡ ส่งอัตโนมัติ</button>
    <div class="seg" style="margin-left:auto">
      <button id="thBtn" class="on">ไทย</button>
      <button id="enBtn">Eng</button>
    </div>
    <div id="status" class="mono" style="width:100%;font-size:12px;color:var(--muted);display:none;align-items:center;gap:12px;flex-wrap:wrap"></div>
  </div>

  <div id="supportWarn" class="warn" style="display:none">⚠ เบราว์เซอร์นี้ไม่รองรับการฟังเสียง — ใช้ Chrome/Edge หรือพิมพ์เอา</div>

  <!-- Input -->
  <div class="bar" style="display:block">
    <textarea id="input" rows="3" placeholder="พิมพ์ หรือพูดคำถาม… (ถ้าแชร์จอ AI จะเห็นจอด้วย)"></textarea>
    <div class="row" style="margin-top:8px">
      <span class="mono" style="font-size:11px;color:var(--muted)">⌘/Ctrl + Enter เพื่อส่ง</span>
      <button id="sendBtn" class="send">➤ ถาม</button>
    </div>
  </div>

  <div id="error" class="warn" style="display:none"></div>
  <div id="results"></div>
  <div id="empty" style="text-align:center;color:var(--muted);font-size:13px;margin-top:40px">
    ใส่ API key ในตั้งค่า ⚙ แล้วเริ่มถามได้เลย
  </div>
</div>

<script>
// ── Provider config ──────────────────────────────────────
const PROVIDERS = {
  openrouter: { label:"OpenRouter", defaultModel:"openai/gpt-4o-mini",
    hint:"จาก openrouter.ai/keys", vision:true },
  gemini: { label:"Gemini", defaultModel:"gemini-2.5-flash",
    hint:"จาก aistudio.google.com/apikey (ฟรี)", vision:true },
  openai: { label:"OpenAI", defaultModel:"gpt-4o-mini",
    hint:"จาก platform.openai.com/api-keys", vision:true },
  claude: { label:"Claude", defaultModel:"claude-haiku-4-5-20251001",
    hint:"จาก console.anthropic.com", vision:true },
};

const QA_SYSTEM =
  "คุณเป็นผู้ช่วยในที่ประชุมทีม dev ตอบกระชับ ตรงประเด็น ใช้ภาษาไทยผสม technical term ภาษาอังกฤษ " +
  "ถ้าเป็นคำถามเทคนิคให้ตอบแบบ production-ready ไม่ต้องเกริ่นยาว ถ้ามี trade-off สำคัญให้บอกสั้นๆ " +
  "ถ้ามีภาพหน้าจอแนบมาให้ดูประกอบ (อ่าน error, code, diagram, ตาราง) " +
  "ผู้ถามเป็น backend dev สาย Go (Fiber v2), PostgreSQL, React/TypeScript, clean architecture.";

const EST_SYSTEM =
  "คุณเป็น senior tech lead ช่วยประเมินงาน dev ในที่ประชุม default stack ทีมคือ Go (Fiber v2), " +
  "PostgreSQL, React+Vite+TypeScript, clean architecture แต่ถ้างานเหมาะกับ stack อื่นให้แนะนำตามจริง " +
  "ถ้ามีภาพหน้าจอแนบมาให้ใช้ประกอบ ตอบเป็น JSON เท่านั้น ห้ามมีข้อความอื่นหรือ markdown fence " +
  'รูปแบบ: {"summary":string,"stack":string[],"totalTime":string,' +
  '"breakdown":[{"task":string,"time":string}],"risks":string[]} ' +
  "totalTime เช่น '3-5 วัน' ภาษาไทยผสม term อังกฤษ ประเมินตามจริง สมมติ dev 1 คนถ้าไม่บอกเป็นอย่างอื่น";

// ── Storage helpers ──
const store = {
  get(k){ try { return localStorage.getItem(k); } catch { return null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch {} },
};

// ── State ──
let provider = store.get("ma_provider") || "gemini";
let mode = "qa";
let lang = "th-TH";
let autoSend = true;
let micOn = false, screenOn = false;
let busy = false;

// ── DOM ──
const $ = (id)=>document.getElementById(id);
const providerSel=$("provider"), modelInp=$("model"), keyInp=$("apikey"), keyHint=$("keyHint");
const results=$("results"), empty=$("empty"), errBox=$("error"), statusEl=$("status");
const dot=$("dot"), countEl=$("count");

// ── Settings init ──
function modelKey(p){ return "ma_model_"+p; }
function keyKey(p){ return "ma_key_"+p; }
function loadProvider(p){
  provider = p; providerSel.value = p;
  modelInp.value = store.get(modelKey(p)) || PROVIDERS[p].defaultModel;
  keyInp.value = store.get(keyKey(p)) || "";
  keyHint.textContent = "· "+PROVIDERS[p].hint;
  store.set("ma_provider", p);
}
providerSel.onchange = ()=>loadProvider(providerSel.value);
modelInp.oninput = ()=>store.set(modelKey(provider), modelInp.value.trim());
keyInp.oninput = ()=>store.set(keyKey(provider), keyInp.value.trim());
loadProvider(provider);

$("gear").onclick = ()=>{ const s=$("settings"); s.style.display = s.style.display==="none"?"flex":"none"; };

// ── Tabs ──
$("tabQa").onclick=()=>setMode("qa");
$("tabEst").onclick=()=>setMode("est");
function setMode(m){
  mode=m;
  $("tabQa").classList.toggle("on", m==="qa");
  $("tabEst").classList.toggle("on", m==="est");
  $("sendBtn").textContent = m==="qa" ? "➤ ถาม" : "➤ ประเมิน";
  $("input").placeholder = m==="qa"
    ? "พิมพ์ หรือพูดคำถาม… (ถ้าแชร์จอ AI จะเห็นจอด้วย)"
    : "อธิบายงานที่อยากให้ประเมิน stack และเวลา…";
}

// ── Toggles ──
$("autoBtn").onclick=()=>{ autoSend=!autoSend; $("autoBtn").classList.toggle("on",autoSend); };
$("thBtn").onclick=()=>setLang("th-TH");
$("enBtn").onclick=()=>setLang("en-US");
function setLang(l){ lang=l; $("thBtn").classList.toggle("on",l==="th-TH"); $("enBtn").classList.toggle("on",l==="en-US"); if(rec) rec.lang=l; }

// ── Error / status ──
function showError(msg){ errBox.style.display=msg?"flex":"none"; errBox.textContent = msg?("⚠ "+msg):""; }
function refreshStatus(){
  const parts=[];
  if(micOn) parts.push('<span style="color:var(--red)">● กำลังฟัง…</span>');
  if(screenOn) parts.push('<span style="color:var(--teal)">🖼 AI จะเห็นจอตอนถาม</span>');
  statusEl.innerHTML = parts.join("");
  statusEl.style.display = parts.length?"flex":"none";
  $("ctrl").classList.toggle("active", micOn||screenOn);
  dot.className = "dot"+(micOn?" live":"");
}

// ── Screen share ──
const video=$("screenVideo");
let screenStream=null;
$("screenBtn").onclick=async()=>{
  if(screenOn){
    screenStream && screenStream.getTracks().forEach(t=>t.stop());
    screenStream=null; video.srcObject=null; screenOn=false;
    $("screenBtn").classList.remove("on"); $("screenBtn").textContent="🖥 แชร์จอ"; refreshStatus(); return;
  }
  try{
    screenStream = await navigator.mediaDevices.getDisplayMedia({video:true,audio:false});
    video.srcObject = screenStream; await video.play();
    screenStream.getVideoTracks()[0].onended = ()=>{ screenStream=null; screenOn=false;
      $("screenBtn").classList.remove("on"); $("screenBtn").textContent="🖥 แชร์จอ"; refreshStatus(); };
    screenOn=true; $("screenBtn").classList.add("on"); $("screenBtn").textContent="🖥 กำลังแชร์จอ";
    showError(""); refreshStatus();
  }catch(e){ showError("เริ่มแชร์จอไม่สำเร็จ หรือถูกยกเลิก"); }
};
function captureFrame(){
  if(!video.videoWidth) return null;
  const max=1280, sc=Math.min(1, max/Math.max(video.videoWidth,video.videoHeight));
  const c=document.createElement("canvas");
  c.width=Math.round(video.videoWidth*sc); c.height=Math.round(video.videoHeight*sc);
  c.getContext("2d").drawImage(video,0,0,c.width,c.height);
  try{ return c.toDataURL("image/jpeg",0.7).split(",")[1]; }catch{ return null; }
}

// ── Voice ──
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec=null, finalText="", silenceTimer=null, processing=false;
if(!SR) $("supportWarn").style.display="flex";

function buildRec(){
  const r=new SR(); r.continuous=true; r.interimResults=true; r.lang=lang;
  r.onresult=(ev)=>{
    let interim="";
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      const t=ev.results[i][0].transcript;
      if(ev.results[i].isFinal) finalText+=t+" "; else interim+=t;
    }
    $("input").value=(finalText+interim).trim();
    if(autoSend && finalText.trim()){
      clearTimeout(silenceTimer);
      silenceTimer=setTimeout(voiceSend,1300);
    }
  };
  r.onerror=(e)=>{ if(e.error==="not-allowed") showError("ไม่ได้รับอนุญาตให้ใช้ไมค์ — เปิดสิทธิ์ใน browser ก่อน"); };
  r.onend=()=>{ if(micOn && !processing){ try{r.start();}catch{} } };
  return r;
}
function startRec(){ if(!rec) rec=buildRec(); if(!rec){ $("supportWarn").style.display="flex"; return; } rec.lang=lang; try{rec.start();}catch{} }
$("micBtn").onclick=()=>{
  if(micOn){ micOn=false; clearTimeout(silenceTimer); try{rec&&rec.stop();}catch{} $("micBtn").className="mic"; $("micBtn").textContent="🎤 เริ่มฟัง"; refreshStatus(); }
  else { showError(""); finalText=""; $("input").value=""; micOn=true; $("micBtn").className="mic on"; $("micBtn").textContent="🛑 หยุดฟัง"; startRec(); refreshStatus(); }
};
async function voiceSend(){
  const text=finalText.trim();
  if(!text||processing) return;
  processing=true; clearTimeout(silenceTimer); finalText="";
  try{rec&&rec.stop();}catch{}
  await submit(text);
  processing=false;
  if(micOn) startRec();
}

// ── LLM call (streaming) ──
function buildRequest(p, key, model, {system, text, image, json}){
  if(p==="gemini"){
    const parts=[{text}];
    if(image) parts.push({inline_data:{mime_type:"image/jpeg",data:image}});
    return {
      url:`https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${encodeURIComponent(key)}`,
      headers:{"Content-Type":"application/json"},
      body:{ systemInstruction:{parts:[{text:system}]}, contents:[{role:"user",parts}],
        generationConfig:{ maxOutputTokens:1024, ...(json?{responseMimeType:"application/json"}:{}) } },
      extract:(j)=>(j.candidates?.[0]?.content?.parts||[]).map(x=>x.text||"").join(""),
    };
  }
  if(p==="claude"){
    const content = image
      ? [{type:"image",source:{type:"base64",media_type:"image/jpeg",data:image}},{type:"text",text}]
      : [{type:"text",text}];
    return {
      url:"https://api.anthropic.com/v1/messages",
      headers:{ "Content-Type":"application/json","x-api-key":key,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
      body:{ model, max_tokens:1024, system, stream:true, messages:[{role:"user",content}] },
      extract:(j)=>(j.type==="content_block_delta"&&j.delta?.type==="text_delta")?(j.delta.text||""):"",
    };
  }
  // openai-compatible: openai, openrouter
  const userContent = image
    ? [{type:"text",text},{type:"image_url",image_url:{url:`data:image/jpeg;base64,${image}`}}]
    : text;
  const url = p==="openrouter" ? "https://openrouter.ai/api/v1/chat/completions"
                               : "https://api.openai.com/v1/chat/completions";
  const headers={ "Content-Type":"application/json","Authorization":"Bearer "+key };
  if(p==="openrouter"){ headers["HTTP-Referer"]="http://localhost"; headers["X-Title"]="Meeting Assistant"; }
  return {
    url, headers,
    body:{ model, stream:true, messages:[{role:"system",content:system},{role:"user",content:userContent}],
      ...(json?{response_format:{type:"json_object"}}:{}) },
    extract:(j)=>j.choices?.[0]?.delta?.content||"",
  };
}

async function streamLLM(req, onToken){
  const res=await fetch(req.url,{ method:"POST", headers:req.headers, body:JSON.stringify(req.body) });
  if(!res.ok){ const t=await res.text(); throw new Error((t||res.statusText).slice(0,400)); }
  const reader=res.body.getReader(); const dec=new TextDecoder();
  let buf="", full="";
  while(true){
    const {done,value}=await reader.read(); if(done) break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split("\n"); buf=lines.pop();
    for(const line of lines){
      const l=line.trim();
      if(!l||!l.startsWith("data:")) continue;
      const data=l.slice(5).trim();
      if(data==="[DONE]") continue;
      try{ const tok=req.extract(JSON.parse(data)); if(tok){ full+=tok; onToken&&onToken(full); } }catch{}
    }
  }
  return full;
}

// ── Rendering ──
let items=0;
function bumpCount(){ countEl.textContent=items+" รายการ"; $("clear").style.display=items?"flex":"none"; empty.style.display=items?"none":"block"; }
$("clear").onclick=()=>{ results.innerHTML=""; items=0; bumpCount(); };

function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function newCard(q, hadImage){
  const card=el("div","card");
  const head=el("div","q");
  head.appendChild(el("span",null,esc(q))); head.firstChild.style.flex="1";
  if(hadImage) head.appendChild(el("span","tag","🖼 เห็นจอ"));
  card.appendChild(head);
  results.prepend(card); items++; bumpCount();
  return card;
}

function renderEstimate(card, e){
  const body=el("div");
  if(e.summary) body.appendChild(el("div",null,esc(e.summary))).style.cssText="font-size:14px;margin-bottom:12px";
  const time=el("div",null,"🕐 "+esc(e.totalTime||"")); time.style.cssText="color:var(--amber);font-weight:600;font-size:14px;margin-bottom:12px"; body.appendChild(time);
  if(e.stack?.length){
    body.appendChild(el("div","lbl","STACK"));
    const wrap=el("div"); wrap.style.cssText="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 12px";
    e.stack.forEach(s=>wrap.appendChild(el("span","stack mono",esc(s)))); body.appendChild(wrap);
  }
  if(e.breakdown?.length){
    body.appendChild(el("div","lbl","BREAKDOWN"));
    const list=el("div"); list.style.margin="6px 0 12px";
    e.breakdown.forEach((b,i)=>{
      const r=el("div"); r.style.cssText="display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:6px 0;"+(i?"border-top:1px solid var(--border)":"");
      r.appendChild(el("span",null,esc(b.task)));
      const t=el("span","mono",esc(b.time)); t.style.cssText="color:var(--muted);white-space:nowrap"; r.appendChild(t);
      list.appendChild(r);
    });
    body.appendChild(list);
  }
  if(e.risks?.length){
    body.appendChild(el("div","lbl","⚠ ความเสี่ยง / ข้อควรระวัง"));
    const ul=el("ul"); ul.style.cssText="margin:6px 0 0;padding-left:18px;font-size:13px;color:var(--muted);line-height:1.6";
    e.risks.forEach(r=>ul.appendChild(el("li",null,esc(r)))); body.appendChild(ul);
  }
  card.appendChild(body);
}

// ── Submit ──
$("sendBtn").onclick=()=>submit();
$("input").addEventListener("keydown",(e)=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") submit(); });
$("input").addEventListener("input",()=>{ const v=$("input").value.trim(); $("sendBtn").classList.toggle("ready",!!v&&!busy); });

async function submit(override){
  const q=(override??$("input").value).trim();
  if(!q||busy) return;
  const key=keyInp.value.trim(), model=modelInp.value.trim();
  if(!key){ showError("ยังไม่ได้ใส่ API key — กด ⚙ ตั้งค่า"); $("settings").style.display="flex"; return; }
  busy=true; showError(""); $("input").value=""; $("sendBtn").classList.remove("ready");
  const image = screenOn ? captureFrame() : null;

  if(mode==="qa"){
    const card=newCard(q, !!image);
    const ans=el("div","ans","▍"); card.appendChild(ans);
    try{
      const req=buildRequest(provider,key,model,{system:QA_SYSTEM,text:q,image,json:false});
      await streamLLM(req,(full)=>{ ans.textContent=full; });
      if(!ans.textContent) ans.textContent="(ไม่มีคำตอบ)";
    }catch(e){ ans.textContent=""; ans.appendChild(el("span","warn","⚠ "+esc(e.message))); }
  } else {
    const card=newCard(q, !!image);
    const load=el("div","mono","กำลังประเมิน…"); load.style.color="var(--muted)"; card.appendChild(load);
    try{
      const req=buildRequest(provider,key,model,{system:EST_SYSTEM,text:q,image,json:true});
      const raw=await streamLLM(req,null);
      const clean=raw.replace(/```json|```/g,"").trim();
      const est=JSON.parse(clean);
      load.remove(); renderEstimate(card,est);
    }catch(e){ load.textContent=""; load.appendChild(el("span","warn","⚠ "+esc(e.message))); }
  }
  busy=false;
}

refreshStatus();
</script>
</body>
