name: Build desktop installers

# รัน: กดเอง (Actions → Run workflow) หรือ push tag v* (สร้าง GitHub Release ให้ด้วย)
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write   # ให้สร้าง Release + แนบไฟล์ติดตั้งได้ตอน push tag

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest   # → .exe (NSIS installer)
          - os: macos-latest     # → .dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      # publish ตอน push tag (electron-builder อ่าน GH_TOKEN → สร้าง Release + แนบไฟล์เอง
      # ชื่อตาม artifactName เดียว ไม่ซ้ำ); dispatch (ไม่มี tag) → --publish never (แค่ build)
      - name: Build installer (electron-builder)
        run: npm run dist -- --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false   # ไม่มี cert → build แบบ unsigned (ข้ามการ sign)

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore
